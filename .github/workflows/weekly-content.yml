name: Weekly Content Drop

# Runs every Monday at 9:00 AM UTC (4am ET, 1am PT).
# Claude reads BACKLOG.md, pulls the top item, writes the lesson, opens a PR.

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch: # Also allow manual trigger from the GitHub UI

permissions:
  contents: write # create branches, push commits
  pull-requests: write # open PRs
  issues: write # create issues if backlog is empty

jobs:
  weekly-lesson:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify backlog exists
        id: backlog_check
        run: |
          if [ ! -f BACKLOG.md ]; then
            echo "Backlog file missing or paused — skipping run."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure git
        if: steps.backlog_check.outputs.skip == 'false'
        run: |
          git config user.name "finance-academy-autopilot"
          git config user.email "autopilot@users.noreply.github.com"

      - name: Run Claude autopilot — backlog pull
        if: steps.backlog_check.outputs.skip == 'false'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # The `prompt` is the full autopilot instruction.
          # It references AUTOPILOT.md which lives in the repo.
          prompt: |
            You are the Finance Academy content autopilot running the weekly backlog-pull workflow.

            Read AUTOPILOT.md and execute **Workflow D — Backlog Pull**.

            Context:
            - This is an automated scheduled run, not a human request.
            - You have full bash access. Use it to run the npm scripts defined in package.json.
            - You have `gh` CLI available for opening PRs.
            - The repo is already checked out. You are on the default branch.
            - Git is configured.

            Strict requirements:
            - Follow every step in Workflow D exactly.
            - Obey all Stop Conditions in AUTOPILOT.md. If any trigger, open a draft PR with "[NEEDS HUMAN]" in the title explaining the situation.
            - Do not merge anything. Only open PRs.
            - After opening the PR, exit cleanly.
          claude_args: |
            --allowedTools Bash,Read,Edit,Write,Glob,Grep
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Autopilot failed: weekly content drop (${new Date().toISOString().slice(0,10)})`,
              body: `The weekly content drop workflow failed. Check the action logs: ${context.payload.repository.html_url}/actions/runs/${context.runId}`,
              labels: ['autopilot-failure']
            });
